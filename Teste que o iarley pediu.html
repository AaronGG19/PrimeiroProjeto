<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
 body {
font: normal 20pt Arial;
background-color: rgb(54, 13, 13);
 }

    </style>
</head>
<body>
    <script>

var nome = window.prompt('Qual é o seu nome?')

window.alert(`Media minima para passar é 6`)

var nota1 = Number(window.prompt('Qual foi sua nota no primeiro bimestre')) //Pedi a nota
while (nota1 > 10 || nota1 < 0){//Analisa se a nota é valida, se for maior que 10 ou menor que zero, ai pe de nota dnv
    window.alert('Pss a maior nota possivel é 10 e a menor é 0');//Avisa que a maior nota é 10 e a menor possivel é 0
nota1 = Number(window.prompt('Qual foi sua nota no primeiro bimestre?')); //Pede a nota dnv
    }
    
    var nota2 = Number(window.prompt('Qual foi sua nota no segundo bimestre')) //Pedi a nota
while (nota2 > 10 || nota2 < 0){//Analisa se a nota é valida, se for maior que 10 ou menor que zero, ai pe de nota dnv
    window.alert('Pss a maior nota possivel é 10 ea menor é 0');//Avisa que a maior nota é 10 e a menor possivel é 0
nota2 = Number(window.prompt('Qual foi sua nota no segundo bimestre?'));//Pede a nota dnv
    }

var nota3 = Number(window.prompt('Qual foi sua nota no terceiro bimestre'))
while (nota3 > 10 || nota3 < 0){
    window.alert('Pss a maior nota possivel é 10 ea menor é 0');
nota3 = Number(window.prompt('Qual foi sua nota no terceiro bimestre?'));
    }

var nota4 = Number(window.prompt('Qual foi sua nota no quarto bimestre'))
while (nota4 > 10 || nota4 < 0){
    window.alert('Pss a maior nota possivel é 10 ea menor é 0');
nota4 = Number(window.prompt('Qual foi sua nota no quarto bimestre?'));//
    }

var resultado = (nota1 + nota2 + nota3 + nota4) / 4 //Soma as notas que o usario mandou e divide por 4
var passou = resultado >= 6 ? "passou" : "não passou" //Aqui é tranquilo eu vi ontem no gustavo guanabara isso a gente usa relacionais para relacionar 
//a media com o a nota 6, e dps a gente usa um ternario para dizer se o aluno passou ou não
window.alert(`Sua media é ${resultado}, você ${passou}`)//Alerta simples só para dizer o RESULTADO e se PASSOU ou não
document.write(`Você ${passou}<br/>`)//Escreve no site se o aluno passou ou não com base no ternario que usamos
document.write(`Olá, <strong> ${nome} <strong> seu nome tem ${nome.length} letra <br/>`)//Isso é para printar o nome do caba no site e contar as letras
document.write(` Seu nome em maisculas é ${nome.toUpperCase()}<br/>`)//Isso é para printar o nome em maisculo
document.writeln(`Seu nome em minusclas é ${nome.toLowerCase()}<br/>`)//Isso é para printar o nome em minusculo

if (resultado >= 6) { //Se o resultado for maior ou igual a 6
    document.write(`Parabens, você passou com a media ${resultado}<br/>`)//Vai digitar isso no site dizendo que o aluno passou e o seu resultado
} else {//Esse outro é para caso o aluno tenha Resultado < 6
    document.write(`Sua media foi ${resultado}, você não passou, melhore para passar na proxima vez<br/>`)//Vai printa na tela dizend oque não passou
}

    </script>
</body>
</html>
